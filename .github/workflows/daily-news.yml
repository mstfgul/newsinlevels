name: Daily news pipeline

on:
  schedule:
    - cron: "0 5 * * *" # every day at 05:00 UTC
  workflow_dispatch:
    inputs:
      count:
        description: "How many articles to fetch"
        default: "3"

permissions:
  contents: write

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch and level news
        run: node pipeline/fetch-news.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ARTICLES_PER_RUN: ${{ github.event.inputs.count || '3' }}

      - name: Commit new articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new articles."
          else
            git commit -m "news: daily articles $(date -u +%F)"
            git push
          fi
