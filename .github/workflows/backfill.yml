name: Backfill language

on:
  workflow_dispatch:
    inputs:
      lang:
        description: "Language code to backfill (en/de/fr/tr)"
        default: "tr"

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Backfill language versions
        run: node pipeline/backfill-language.mjs ${{ github.event.inputs.lang || 'tr' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit updated articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Nothing to backfill."
          else
            git commit -m "news: backfill ${{ github.event.inputs.lang || 'tr' }} versions"
            git push
          fi
