name: Daily story pipeline

on:
  schedule:
    - cron: "45 5 * * *" # every day at 05:45 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-story
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate today's story part
        run: node pipeline/fetch-story.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit new part
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new story part."
          else
            git commit -m "story: daily part $(date -u +%F)"
            # The branch may have moved while we were generating — rebase, then push.
            git pull --rebase origin main
            git push
          fi
