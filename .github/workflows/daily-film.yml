name: Daily film pipeline

on:
  schedule:
    - cron: "30 6 * * *" # every day at 06:30 UTC, after the quote run
  workflow_dispatch:
    inputs:
      title:
        description: "Film title to feature (leave empty to let AI pick automatically)"
        required: false
      year:
        description: "Release year (optional, helps confirm the right film)"
        required: false
      director:
        description: "Director (optional, only used if TMDB itself lacks credits)"
        required: false

permissions:
  contents: write

concurrency:
  group: daily-film
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Pick and analyze a film
        run: node pipeline/fetch-film.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TMDB_READ_TOKEN: ${{ secrets.TMDB_READ_TOKEN }}
          MANUAL_TITLE: ${{ github.event.inputs.title }}
          MANUAL_YEAR: ${{ github.event.inputs.year }}
          MANUAL_DIRECTOR: ${{ github.event.inputs.director }}

      - name: Commit new film
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new film."
          else
            git commit -m "film: daily film $(date -u +%F)"
            # The branch may have moved while we were generating — rebase, then push.
            git pull --rebase origin main
            git push
          fi
