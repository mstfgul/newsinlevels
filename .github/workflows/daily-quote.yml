name: Daily quote pipeline

on:
  schedule:
    - cron: "15 6 * * *" # every day at 06:15 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-quote
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch and level today's quote
        run: node pipeline/fetch-quote.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit new quote
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new quote."
          else
            git commit -m "quote: daily quote $(date -u +%F)"
            # The branch may have moved while we were generating — rebase, then push.
            git pull --rebase origin main
            git push
          fi
