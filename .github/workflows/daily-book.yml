name: Daily book pipeline

on:
  schedule:
    - cron: "45 6 * * *" # every day at 06:45 UTC, after the film run
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-book
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Fetch and level today's book
        run: node pipeline/fetch-book.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit new book
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new book."
          else
            git commit -m "book: daily book $(date -u +%F)"
            # The branch may have moved while we were generating — rebase, then push.
            git pull --rebase origin main
            git push
          fi
